version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: beleqet-postgres
    restart: always
    environment:
      POSTGRES_USER: beleqet_user
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: beleqet_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: beleqet-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beleqet-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${PORT:-4000}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_TLS=${REDIS_TLS:-false}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_ACCESS_EXPIRES=${JWT_ACCESS_EXPIRES:-15m}
      - JWT_REFRESH_EXPIRES=${JWT_REFRESH_EXPIRES:-30d}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHANNEL_ID=${TELEGRAM_CHANNEL_ID}
      - CHAPA_SECRET_KEY=${CHAPA_SECRET_KEY}
      - CHAPA_PUBLIC_KEY=${CHAPA_PUBLIC_KEY}
      - CHAPA_WEBHOOK_SECRET=${CHAPA_WEBHOOK_SECRET}
      - CHAPA_CALLBACK_URL=${CHAPA_CALLBACK_URL:-http://localhost:4000/api/v1/escrow/callback}
      - CHAPA_RETURN_URL=${CHAPA_RETURN_URL:-http://localhost:3000/freelance/payment-success}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM:-Beleqet <noreply@beleqet.com>}
      - BULL_BOARD_USERNAME=${BULL_BOARD_USERNAME:-admin}
      - BULL_BOARD_PASSWORD=${BULL_BOARD_PASSWORD} 

    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  redis_data:
